<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <link rel="manifest" href="data:application/json,{
        'name': 'JARVIS',
        'short_name': 'JARVIS',
        'start_url': '.',
        'display': 'standalone',
        'background_color': '#0a0a2e',
        'theme_color': '#0a0a2e',
        'icons': [{'src': 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%2300ffff%22/><text x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%23000%22 font-size=%2240%22>J</text></svg>', 'sizes': 'any'}]
    }">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a2e;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Arial', sans-serif;
        }
        .jarvis-container {
            text-align: center; color: white; padding: 20px;
        }
        .arc-reactor {
            width: 150px; height: 150px;
            border: 4px solid #00ffff;
            border-radius: 50%; margin: 0 auto 30px;
            background: radial-gradient(circle, #00ffff20 0%, #0a0a2e 70%);
            animation: pulse 2s infinite;
            display: flex; align-items: center; justify-content: center;
        }
        .arc-reactor::after {
            content: ''; width: 40px; height: 40px;
            background: #00ffff; border-radius: 50%;
            box-shadow: 0 0 30px #00ffff;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px #00ffff; }
            50% { box-shadow: 0 0 60px #00ffff, 0 0 100px #00ffff80; }
        }
        .status {
            font-size: 24px; margin: 20px 0;
            color: #00ffff; text-shadow: 0 0 20px #00ffff;
        }
        .btn {
            background: #00ffff20; color: #00ffff;
            border: 2px solid #00ffff; padding: 15px 40px;
            font-size: 20px; border-radius: 30px; cursor: pointer;
            margin: 10px; transition: all 0.3s;
        }
        .btn:active {
            background: #00ffff; color: #0a0a2e;
            box-shadow: 0 0 40px #00ffff;
        }
        .response {
            margin-top: 30px; min-height: 60px;
            color: #aaa; font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="jarvis-container">
        <div class="arc-reactor"></div>
        <div class="status" id="status">JARVIS en línea</div>
        <button class="btn" onclick="escuchar()">🎤 Hablar</button>
        <div class="response" id="respuesta"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const respuesta = document.getElementById('respuesta');
        
        // Síntesis de voz (hablar)
        function hablar(texto) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-ES';
            utterance.rate = 1.1;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        // Reconocimiento de voz (escuchar)
        function escuchar() {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
                return;
            }
            
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            
            status.textContent = 'Escuchando...';
            status.style.color = '#ffaa00';
            
            recognition.onresult = (event) => {
                const comando = event.results[0][0].transcript.toLowerCase();
                status.textContent = 'JARVIS en línea';
                status.style.color = '#00ffff';
                procesarComando(comando);
            };
            
            recognition.onerror = () => {
                status.textContent = 'JARVIS en línea';
                status.style.color = '#00ffff';
                respuesta.textContent = 'No entendí, intenta de nuevo';
            };
            
            recognition.start();
        }

        // Procesar comandos
        function procesarComando(comando) {
            respuesta.textContent = 'Tú: ' + comando;
            
            if (comando.includes('hola') || comando.includes('jarvis')) {
                hablar('Hola, señor. ¿En qué puedo ayudarle?');
            }
            else if (comando.includes('hora')) {
                const ahora = new Date();
                const hora = ahora.getHours();
                const minutos = ahora.getMinutes();
                hablar(`Son las ${hora} horas con ${minutos} minutos`);
            }
            else if (comando.includes('fecha')) {
                const ahora = new Date();
                const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const fecha = ahora.toLocaleDateString('es-ES', opciones);
                hablar(`Hoy es ${fecha}`);
            }
            else if (comando.includes('buscar') || comando.includes('google')) {
                hablar('¿Qué quieres buscar?');
                setTimeout(() => {
                    const recognition = new webkitSpeechRecognition();
                    recognition.lang = 'es-ES';
                    recognition.onresult = (event) => {
                        const busqueda = event.results[0][0].transcript;
                        hablar(`Buscando ${busqueda}`);
                        window.open(`https://www.google.com/search?q=${busqueda}`, '_blank');
                    };
                    recognition.start();
                }, 2000);
            }
            else if (comando.includes('youtube')) {
                hablar('Abriendo YouTube');
                window.open('https://youtube.com', '_blank');
            }
            else if (comando.includes('whatsapp')) {
                hablar('Abriendo WhatsApp Web');
                window.open('https://web.whatsapp.com', '_blank');
            }
            else if (comando.includes('clima') || comando.includes('tiempo')) {
                hablar('Abriendo el pronóstico del tiempo');
                window.open('https://www.google.com/search?q=clima', '_blank');
            }
            else if (comando.includes('gracias')) {
                hablar('De nada, señor. Para eso estoy.');
            }
            else if (comando.includes('apagar') || comando.includes('dormir')) {
                hablar('Hasta luego, señor.');
                setTimeout(() => {
                    if (confirm('¿Cerrar JARVIS?')) window.close();
                }, 2000);
            }
            else {
                hablar('No tengo esa función todavía, pero estoy aprendiendo.');
            }
        }

        // Iniciar automáticamente con saludo
        window.onload = () => {
            setTimeout(() => hablar('JARVIS en línea. Dígame.'), 1000);
        };

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:application/javascript,').catch(() => {});
            });
        }
    </script>
</body>
</html>
